<style>
  :root {
    /* ===== Design tokens — "instrument cluster" theme ===== */
    --bg-color: #070B14;
    --bg-color-2: #0B1120;
    --card-bg: #121a2c;
    --surface-elevated: #17203a;
    --nav-bg: rgba(7, 11, 20, 0.82);
    --input-bg: #1b2440;
    --input-bg-focus: #212c4d;
    --border-soft: #232f52;
    --border-soft-2: #1a233f;
    --text-main: #F3F6FC;
    --text-secondary: #92A0C2;
    --text-muted: #5B688C;

    --primary: #22D3EE;
    --primary-2: #38BDF8;
    --primary-glow: rgba(34, 211, 238, 0.35);

    --ethanol: #34D399;
    --ethanol-glow: rgba(52, 211, 153, 0.35);
    --gasolina: #FB923C;
    --gasolina-glow: rgba(251, 146, 60, 0.35);

    --success: #10B981;
    --danger: #F87171;
    --warning: #FBBF24;

    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;

    --font-display: 'Space Grotesk', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ===== Tema: Escuro (neutro, alto contraste) ===== */
  body[data-color-theme="escuro"] {
    --bg-color: #000000; --bg-color-2: #060606; --card-bg: #0D0D0D; --surface-elevated: #131313;
    --nav-bg: rgba(0, 0, 0, 0.88); --input-bg: #161616; --input-bg-focus: #1C1C1C;
    --border-soft: #272727; --border-soft-2: #1A1A1A;
    --text-main: #F5F5F5; --text-secondary: #9C9C9C; --text-muted: #5C5C5C;
    --primary: #60A5FA; --primary-2: #3B82F6; --primary-glow: rgba(96,165,250,0.32);
  }

  /* ===== Tema: Claro (uso diurno) ===== */
  body[data-color-theme="claro"] {
    --bg-color: #F3F5FA; --bg-color-2: #EAEEF6; --card-bg: #FFFFFF; --surface-elevated: #F3F5FA;
    --nav-bg: rgba(255, 255, 255, 0.85); --input-bg: #EEF1F8; --input-bg-focus: #E4E9F5;
    --border-soft: #DCE2EF; --border-soft-2: #E4E9F5;
    --text-main: #101729; --text-secondary: #51607E; --text-muted: #8993AC;
    --primary: #0EA5C7; --primary-2: #22D3EE; --primary-glow: rgba(14,165,199,0.25);
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background:
      radial-gradient(720px 420px at 10% -10%, rgba(34,211,238,0.10), transparent 60%),
      radial-gradient(640px 480px at 100% 0%, rgba(52,211,153,0.08), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(251,146,60,0.06), transparent 60%),
      var(--bg-color);
    background-attachment: fixed;
    color: var(--text-main);
    margin: 0;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom);
  }
  * { color: var(--text-main); }

  ::selection { background: var(--primary-glow); color: #fff; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

  :focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
    border-radius: 6px;
  }

  header {
    background: var(--nav-bg);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    padding: 16px 20px;
    padding-top: calc(16px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-soft-2);
    position: sticky;
    top: 0;
    z-index: 110;
  }
  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--font-display);
    font-size: 25px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #F3F6FC 20%, var(--primary) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    border: 1px solid var(--border-soft);
    padding: 5px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  #logo-svg path { animation: dash-flow 4.5s var(--ease) infinite; }
  @keyframes dash-flow {
    0%, 100% { filter: drop-shadow(0 0 2px rgba(34,211,238,0.35)); }
    50% { filter: drop-shadow(0 0 7px rgba(34,211,238,0.75)); }
  }

  .header-right { display: flex; align-items: center; gap: 10px; position: relative; }
  #themeBtn {
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    border-radius: 10px; border: 1px solid var(--border-soft); background: var(--input-bg);
    cursor: pointer; transition: all 0.2s var(--ease);
  }
  #themeBtn:hover { border-color: var(--primary); }
  #themeBtn:active { transform: scale(0.93); }
  #themeBtn svg { width: 17px; height: 17px; stroke: var(--primary); }
  #themePanel {
    display: none; position: absolute; top: 44px; right: 0; z-index: 200;
    background: var(--card-bg); border: 1px solid var(--border-soft);
    border-radius: var(--radius-md); padding: 14px; width: 190px;
    box-shadow: 0 20px 40px -12px rgba(0,0,0,0.55);
    animation: rise-in 0.2s var(--ease);
  }
  #themePanel.open { display: block; }
  #themePanel .theme-title { font-family: var(--font-display); font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .theme-option { display: flex; align-items: center; gap: 10px; padding: 8px 6px; border-radius: 8px; cursor: pointer; transition: background 0.15s var(--ease); }
  .theme-option:hover { background: var(--input-bg); }
  .theme-option .swatch { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; border: 2px solid transparent; box-shadow: 0 0 0 1px var(--border-soft) inset; }
  .theme-option span.label { font-size: 13.5px; font-weight: 500; }
  .theme-option.active .swatch { border-color: var(--text-main); }
  .theme-option.active span.label { color: var(--primary); font-weight: 700; }

  #profileBtn {
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 1px solid var(--border-soft); background: var(--input-bg);
    cursor: pointer; transition: all 0.2s var(--ease); overflow: hidden; padding: 0;
  }
  #profileBtn:hover { border-color: var(--primary); }
  #profileBtn:active { transform: scale(0.93); }
  #profileBtn svg { width: 17px; height: 17px; stroke: var(--primary); }
  #profileBtn img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  #profilePanel {
    display: none; position: absolute; top: 44px; right: 0; z-index: 200;
    background: var(--card-bg); border: 1px solid var(--border-soft);
    border-radius: var(--radius-md); padding: 16px; width: 230px;
    box-shadow: 0 20px 40px -12px rgba(0,0,0,0.55);
    animation: rise-in 0.2s var(--ease);
  }
  #profilePanel.open { display: block; }
  .profile-info { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .profile-info img { width: 40px; height: 40px; border-radius: 50%; }
  .profile-info .avatar-fallback {
    width: 40px; height: 40px; border-radius: 50%; background: var(--input-bg);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .profile-info .avatar-fallback svg { width: 20px; height: 20px; stroke: var(--primary); }
  .profile-info .names { min-width: 0; }
  .profile-info .p-name { font-family: var(--font-display); font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .profile-info .p-email { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .google-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 11px; border-radius: 10px; border: 1.5px solid var(--border-soft);
    background: var(--input-bg); color: var(--text-main); font-family: var(--font-body);
    font-weight: 600; font-size: 13.5px; cursor: pointer; transition: all 0.2s var(--ease);
  }
  .google-btn:hover { border-color: var(--primary); background: var(--input-bg-focus); }
  .google-btn:active { transform: scale(0.97); }
  .google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
  .google-btn:disabled { opacity: 0.6; cursor: wait; }
  .logout-btn {
    width: 100%; padding: 10px; border-radius: 10px; border: none;
    background: rgba(248,113,113,0.14); color: var(--danger); font-family: var(--font-display);
    font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s var(--ease);
  }
  .logout-btn:hover { filter: brightness(1.15); }
  .profile-hint { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-top: 10px; }
  .profile-status { font-size: 11px; color: var(--text-secondary); line-height: 1.5; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-soft); }

  nav {
    display: flex;
    gap: 6px;
    background: var(--nav-bg);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    position: sticky;
    top: calc(64px + env(safe-area-inset-top));
    z-index: 100;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-soft-2);
  }
  nav button {
    flex: 1;
    padding: 12px 8px;
    border: 1px solid transparent;
    border-radius: 12px;
    background: transparent;
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: color 0.3s var(--ease), background 0.3s var(--ease), border-color 0.3s var(--ease), transform 0.15s var(--ease);
  }
  nav button:hover { color: var(--text-main); }
  nav button:active { transform: scale(0.97); }
  nav button.active {
    color: #04121a;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    border-color: transparent;
    box-shadow: 0 4px 18px var(--primary-glow);
  }

  main {
    max-width: 520px;
    margin: 22px auto;
    background: linear-gradient(180deg, var(--card-bg), var(--bg-color-2));
    border: 1px solid var(--border-soft-2);
    padding: 22px;
    border-radius: var(--radius-lg);
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.6);
    animation: rise-in 0.5s var(--ease);
  }
  @keyframes rise-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #form { max-height: calc(100vh - 220px); overflow-y: auto; padding-bottom: 320px; scroll-behavior: smooth; }

  .field { margin-bottom: 18px; }
  .field-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .field-label svg { width: 16px; height: 16px; stroke: var(--primary); flex-shrink: 0; }

  input, select {
    width: 100%;
    padding: 14px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border-soft);
    background: var(--input-bg);
    color: var(--text-main);
    font-family: var(--font-body);
    font-size: 16px;
    box-sizing: border-box;
    transition: border-color 0.2s var(--ease), background 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }
  input::placeholder { color: var(--text-muted); }
  input:hover, select:hover { border-color: #2c3a63; }
  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    background: var(--input-bg-focus);
    box-shadow: 0 0 0 4px var(--primary-glow);
  }
  input[type="number"], input[type="date"] { font-family: var(--font-mono); }
  input[type="date"] { color-scheme: dark; }

  .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

  .selector-group { display: flex; gap: 10px; margin: 0 0 18px; }
  .selector-group button {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px;
    border: 1.5px solid var(--border-soft);
    border-radius: var(--radius-sm);
    background: var(--input-bg);
    color: var(--text-secondary);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.25s var(--ease);
  }
  .selector-group button svg { width: 17px; height: 17px; stroke: currentColor; }
  .selector-group button:active { transform: scale(0.97); }
  .selector-group button.active[data-fuel="Etanol"] {
    background: linear-gradient(135deg, rgba(52,211,153,0.22), rgba(52,211,153,0.08));
    border-color: var(--ethanol);
    color: var(--ethanol);
    box-shadow: 0 0 0 3px var(--ethanol-glow);
  }
  .selector-group button.active[data-fuel="Gasolina"] {
    background: linear-gradient(135deg, rgba(251,146,60,0.22), rgba(251,146,60,0.08));
    border-color: var(--gasolina);
    color: var(--gasolina);
    box-shadow: 0 0 0 3px var(--gasolina-glow);
  }

  .btn-group { display: flex; gap: 10px; margin-top: 25px; }
  button.action {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: var(--radius-sm);
    color: white;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.15s var(--ease), box-shadow 0.25s var(--ease), filter 0.2s var(--ease);
    box-shadow: 0 10px 24px -10px rgba(0,0,0,0.5);
  }
  button.action:hover { filter: brightness(1.08); }
  button.action:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  #saveBtn { background: linear-gradient(135deg, var(--success), #059669); box-shadow: 0 10px 26px -10px rgba(16,185,129,0.5); }
  .btn-group .action:last-child { background: linear-gradient(135deg, var(--danger), #dc2626); box-shadow: 0 10px 26px -10px rgba(248,113,113,0.45); }

  /* ===== Stats / gauge ===== */
  .stats-box {
    background: var(--surface-elevated);
    padding: 18px;
    border-radius: var(--radius-md);
    margin-bottom: 16px;
    border: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .stats-text { flex: 1; font-size: 13px; line-height: 1.9; color: var(--text-secondary); }
  .stats-text strong { color: var(--text-main); font-family: var(--font-mono); font-weight: 600; }
  .stats-empty { font-size: 14px; color: var(--text-muted); text-align: center; padding: 6px 0; width: 100%; }

  .gauge-wrap { position: relative; width: 84px; height: 84px; flex-shrink: 0; }
  .gauge-wrap svg { transform: rotate(-90deg); }
  .gauge-track { fill: none; stroke: var(--border-soft); stroke-width: 8; }
  .gauge-value { fill: none; stroke: url(#gaugeGradient); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s var(--ease); }
  .gauge-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .gauge-center .num { font-family: var(--font-mono); font-size: 15px; font-weight: 700; color: var(--primary); line-height: 1; }
  .gauge-center .unit { font-size: 8px; color: var(--text-muted); letter-spacing: 0.04em; margin-top: 2px; }

  /* ===== History cards ===== */
  .history-card {
    background: var(--surface-elevated);
    padding: 20px;
    border-radius: var(--radius-md);
    margin-bottom: 14px;
    border: 1px solid var(--border-soft);
    border-left: 4px solid #ccc;
    font-size: 14.5px;
    line-height: 1.7;
    position: relative;
    animation: rise-in 0.35s var(--ease);
    transition: border-color 0.2s var(--ease), transform 0.2s var(--ease);
  }
  .history-card:active { transform: scale(0.995); }
  .fuel-Etanol { border-left-color: var(--ethanol); }
  .fuel-Gasolina { border-left-color: var(--gasolina); }

  .history-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .history-car { font-family: var(--font-display); font-size: 16.5px; font-weight: 700; }
  .history-date { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }

  .fuel-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 600; font-family: var(--font-display);
    padding: 3px 9px; border-radius: 20px; margin: 2px 0 8px;
  }
  .fuel-pill.Etanol { background: rgba(52,211,153,0.14); color: var(--ethanol); }
  .fuel-pill.Gasolina { background: rgba(251,146,60,0.14); color: var(--gasolina); }

  .history-metrics { display: flex; flex-wrap: wrap; gap: 6px 18px; color: var(--text-secondary); font-size: 13.5px; }
  .history-metrics b { color: var(--text-main); font-family: var(--font-mono); }

  .history-divider { border: none; border-top: 1px dashed var(--border-soft); margin: 10px 0; }

  .history-actions { position: absolute; top: 14px; right: 14px; display: flex; gap: 6px; }
  .history-actions button {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; padding: 0;
    font-size: 12px; border: none; border-radius: 8px; cursor: pointer;
    transition: transform 0.15s var(--ease), filter 0.2s var(--ease);
  }
  .history-actions button:hover { filter: brightness(1.15); }
  .history-actions button:active { transform: scale(0.9); }
  .history-actions svg { width: 14px; height: 14px; stroke: white; }
  .edit-btn { background: linear-gradient(135deg, var(--warning), #f59e0b); }
  .delete-btn { background: linear-gradient(135deg, var(--danger), #dc2626); }

  .empty-state {
    text-align: center; padding: 46px 20px; color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .empty-state svg { width: 42px; height: 42px; stroke: var(--text-muted); opacity: 0.7; }
  .empty-state p { margin: 0; font-size: 14px; }

  .chart-wrapper {
    background: var(--surface-elevated);
    padding: 18px 16px 10px;
    border-radius: var(--radius-md);
    margin-bottom: 20px;
    height: 320px;
    border: 1px solid var(--border-soft);
  }

  /* ===== Toast ===== */
  #toast {
    visibility: hidden;
    min-width: 240px;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--success), #059669);
    color: #fff;
    font-family: var(--font-display); font-weight: 600; font-size: 14px;
    border-radius: 14px;
    padding: 14px 18px;
    position: fixed;
    z-index: 999;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%) translateY(20px);
    opacity: 0;
    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
    box-shadow: 0 12px 28px -8px rgba(0,0,0,0.5);
  }
  #toast svg { width: 18px; height: 18px; stroke: #fff; flex-shrink: 0; }
  #toast.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.danger { background: linear-gradient(135deg, var(--danger), #dc2626); }

  /* ===== Modal ===== */
  #confirmModal {
    display: none; position: fixed; inset: 0;
    background: rgba(4, 8, 16, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 1000; justify-content: center; align-items: center;
  }
  #confirmModal > div {
    background: var(--card-bg);
    padding: 28px 24px;
    border-radius: var(--radius-lg);
    text-align: center;
    width: 85%;
    max-width: 320px;
    border: 1px solid var(--border-soft);
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7);
    animation: rise-in 0.25s var(--ease);
  }
  .modal-icon {
    width: 52px; height: 52px; margin: 0 auto 14px;

<script>
const FIREBASE_URL = "https://projeto-flutter-c6a24-default-rtdb.firebaseio.com/";
const BRL = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
let history = [];
let activeCharts = [];
let deleteId = null;

function selectOption(inputId, value, groupId) {
  document.getElementById(inputId).value = value;
  const btns = document.getElementById(groupId).getElementsByTagName('button');
  for(let b of btns) b.classList.remove('active');
  event.target.closest('button').classList.add('active');
}

const ICONS = {
  success: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  danger: '<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>'
};

function showToast(msg = "Sucesso!", type = "success") {
  const x = document.getElementById("toast");
  x.innerHTML = (ICONS[type] || ICONS.success) + '<span>' + msg + '</span>';
  x.className = "show" + (type === "danger" ? " danger" : "");
  setTimeout(() => x.className = "", 3000);
}

function formatDate(dateStr) { const [y, m, d] = dateStr.split('-'); return `${d}/${m}/${y}`; }

async function loadData() {
  try {
    const resp = await fetch(FIREBASE_URL + "abastecimentos.json?orderBy=\"$key\"&limitToLast=50");
    if (!resp.ok) {
      showToast("Não foi possível carregar os dados (servidor recusou). Verifique as regras do Firebase.", "danger");
      return;
    }
    const data = await resp.json();
    history = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
  } catch (e) {
    console.error(e);
    showToast("Sem conexão com o servidor. Verifique sua internet.", "danger");
    return;
  }
  
  const cars = [...new Set(history.map(h => h.car))];
  const list = document.getElementById("carList");
  list.innerHTML = "";
  cars.forEach(c => list.innerHTML += `<option value="${c}">`);
  
  const filterCar = document.getElementById("filterCar");
  const currentCar = filterCar.value;
  filterCar.innerHTML = '<option value="Todos">Todos os veículos</option>';
  cars.forEach(c => filterCar.innerHTML += `<option value="${c}">${c}</option>`);
  filterCar.value = currentCar;

  const dates = [...new Set(history.map(h => h.date.substring(0, 7)))].sort().reverse();
  const filterDate = document.getElementById("filterDate");
  const currentDate = filterDate.value;
  filterDate.innerHTML = '<option value="Todos">Mês/Ano</option>';
  dates.forEach(d => filterDate.innerHTML += `<option value="${d}">${d.split('-')[1]}/${d.split('-')[0]}</option>`);
  filterDate.value = currentDate;
  
  showHistory();
}

async function saveData() {
  const liters = parseFloat(document.getElementById("liters").value);
  const value = parseFloat(document.getElementById("value").value);
  const km = parseFloat(document.getElementById("km").value);
  const car = document.getElementById("car").value;

  if(!car || isNaN(liters) || isNaN(value) || isNaN(km) || liters <= 0 || value <= 0 || km <= 0) {
    alert("Preencha todos os campos com valores positivos!");
    return;
  }

  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "Salvando...";

  const data = { car, fuel: document.getElementById("fuel").value, liters, value, km, date: document.getElementById("date").value, costPerKm: value / km, consumption: km / liters };
  const editId = document.getElementById("editId").value;
  
  try {
    const resp = await fetch(`${FIREBASE_URL}abastecimentos/${editId ? editId : ''}.json`, { 
      method: editId ? 'PUT' : 'POST', 
      body: JSON.stringify(data) 
    });

    if (!resp.ok) {
      showToast(`Erro ao salvar (servidor recusou, código ${resp.status}). Verifique as regras do Firebase.`, "danger");
      btn.disabled = false;
      btn.textContent = "Registrar";
      return;
    }

    showToast(editId ? "Atualizado!" : "Registrado!");
    clearFormAfterSave();
    loadData();
  } catch (e) {
    console.error(e);
    showToast("Sem conexão com o servidor. O lançamento NÃO foi salvo.", "danger");
  }
  btn.disabled = false;
  btn.textContent = "Registrar";
}

function clearForm() {
  document.getElementById("car").value = "";
  document.getElementById("liters").value = "";
  document.getElementById("value").value = "";
  document.getElementById("km").value = "";
  document.getElementById("editId").value = "";
}

// Igual ao clearForm(), mas mantém o campo Veículo preenchido — assim você não
// precisa redigitar o carro a cada novo abastecimento do mesmo veículo.
function clearFormAfterSave() {
  document.getElementById("liters").value = "";
  document.getElementById("value").value = "";
  document.getElementById("km").value = "";
  document.getElementById("editId").value = "";
}

function deleteEntry(id) {
  deleteId = id;
  document.getElementById('confirmModal').style.display = 'flex';
}

function hideConfirm() {
  document.getElementById('confirmModal').style.display = 'none';
}

async function confirmDelete() {
  hideConfirm();
  const response = await fetch(`${FIREBASE_URL}abastecimentos/${deleteId}.json`, { 
    method: 'DELETE',
    cache: 'no-cache' 
  });
  if (response.ok) {
    showToast("Excluído!", "danger");
    loadData();
  } else {
    alert("Erro ao excluir no servidor.");
  }
}

function editEntry(id) {
  const entry = history.find(h => h.id === id);
  if (!entry) return;
  document.getElementById("editId").value = id;
  document.getElementById("car").value = entry.car;
  document.getElementById("date").value = entry.date;
  document.getElementById("fuel").value = entry.fuel;
  document.getElementById("liters").value = entry.liters;
  document.getElementById("value").value = entry.value;
  document.getElementById("km").value = entry.km;
  const fuelBtns = document.getElementById('fuel-btns').getElementsByTagName('button');
  for (let b of fuelBtns) b.classList.toggle('active', b.getAttribute('data-fuel') === entry.fuel);
  showTab('form');
}

function gaugeHTML(avgCons) {
  const r = 34, circ = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(avgCons / 25, 1));
  const offset = circ * (1 - pct);
  return `
    <div class="gauge-wrap">
      <svg width="84" height="84" viewBox="0 0 84 84">
        <circle class="gauge-track" cx="42" cy="42" r="${r}"></circle>
        <circle class="gauge-value" cx="42" cy="42" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"></circle>
      </svg>
      <div class="gauge-center">
        <span class="num">${avgCons.toFixed(1)}</span>
        <span class="unit">KM/L</span>
      </div>
    </div>`;
}

function showHistory() {
  const fCar = document.getElementById("filterCar").value;
  const fFuel = document.getElementById("filterFuel").value;
  const fDate = document.getElementById("filterDate").value;

  const filtered = history.filter(h => {
    const matchCar = (fCar === "Todos" || h.car === fCar);
    const matchFuel = (fFuel === "Todos" || h.fuel === fFuel);
    const matchDate = (fDate === "Todos" || h.date.substring(0, 7) === fDate);
    return matchCar && matchFuel && matchDate;
  });
  
  if (filtered.length > 0) {
    const avgCons = filtered.reduce((acc, h) => acc + h.consumption, 0) / filtered.length;
    const avgCost = filtered.reduce((acc, h) => acc + h.costPerKm, 0) / filtered.length;
    const etanolList = filtered.filter(h => h.fuel === 'Etanol');
    const gasolinaList = filtered.filter(h => h.fuel === 'Gasolina');
    const avgEtanol = etanolList.length ? etanolList.reduce((a, h) => a + h.consumption, 0) / etanolList.length : null;
    const avgGasolina = gasolinaList.length ? gasolinaList.reduce((a, h) => a + h.consumption, 0) / gasolinaList.length : null;
    const avgCostEtanol = etanolList.length ? etanolList.reduce((a, h) => a + h.costPerKm, 0) / etanolList.length : null;
    const avgCostGasolina = gasolinaList.length ? gasolinaList.reduce((a, h) => a + h.costPerKm, 0) / gasolinaList.length : null;
    document.getElementById("stats").innerHTML = `
      ${gaugeHTML(avgCons)}
      <div class="stats-text">
        Média geral: <strong>${avgCons.toFixed(1)} km/L</strong><br>
        Custo geral: <strong>${BRL.format(avgCost)}/km</strong><br>
        ${avgEtanol !== null ? `Etanol: <strong>${avgEtanol.toFixed(1)} km/L</strong> · <strong>${BRL.format(avgCostEtanol)}/km</strong> (${etanolList.length})<br>` : ''}
        ${avgGasolina !== null ? `Gasolina: <strong>${avgGasolina.toFixed(1)} km/L</strong> · <strong>${BRL.format(avgCostGasolina)}/km</strong> (${gasolinaList.length})<br>` : ''}
        Registros: <strong>${filtered.length}</strong>
      </div>
    `;
  } else {
    document.getElementById("stats").innerHTML = `<div class="stats-empty">Nenhum dado encontrado.</div>`;
  }

  let html = "";
  filtered.reverse().forEach(h => {
    html += `
      <div class="history-card fuel-${h.fuel}">
        <div class="history-actions">
          <button class="edit-btn" onclick="editEntry('${h.id}')" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
          <button class="delete-btn" onclick="deleteEntry('${h.id}')" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
        </div>
        <div class="history-top">
          <span class="history-car">${h.car}</span>
        </div>
        <span class="history-date">${formatDate(h.date)}</span><br>
        <span class="fuel-pill ${h.fuel}">${h.fuel}</span>
        <hr class="history-divider">
        <div class="history-metrics">
          <span>Litros: <b>${h.liters}L</b></span>
          <span>Valor: <b>${BRL.format(h.value)}</b></span>
          <span>KM: <b>${h.km}</b></span>
          <span>Consumo: <b>${Number(h.consumption).toFixed(1)} km/L</b></span>
          <span>Custo: <b>${BRL.format(h.costPerKm)}/km</b></span>
        </div>
      </div>`;
  });
  document.getElementById("output").innerHTML = html || `
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V9a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v13M4 22h10M18 8l1.5 1.5a2 2 0 0 1 .5 1.4V17a1.5 1.5 0 0 1-3 0v-3"/></svg>
      <p>Nenhum registro. Abasteça para começar a acompanhar seu consumo.</p>
    </div>`;
}

const CHART_CDNS = [
  'https://cdn.jsdelivr.net/npm/chart.js',
  'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js'
];
let chartCdnIndex = 0;
let chartLoadAttempted = false;

function loadChartJsThen(callback) {
  if (typeof Chart !== 'undefined') { callback(); return; }
  if (chartCdnIndex >= CHART_CDNS.length) { callback(); return; }
  chartLoadAttempted = true;
  const s = document.createElement('script');
  s.src = CHART_CDNS[chartCdnIndex];
  s.onload = () => callback();
  s.onerror = () => { chartCdnIndex++; loadChartJsThen(callback); };
  document.head.appendChild(s);
}

function renderCharts() {
  loadChartJsThen(doRenderCharts);
}

function doRenderCharts() {
  const errorBox = document.getElementById('chartsError');
  const wrappers = document.getElementById('chartsWrappers');

  if (typeof Chart === 'undefined') {
    wrappers.style.display = 'none';
    errorBox.style.display = 'block';
    errorBox.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>
        <p>Não foi possível carregar os gráficos (verifique sua conexão).</p>
        <button class="action" style="max-width:180px;" onclick="renderCharts()">Tentar novamente</button>
      </div>`;
    return;
  }
  wrappers.style.display = 'block';
  errorBox.style.display = 'none';

  activeCharts.forEach(c => c.destroy()); 
  activeCharts = [];
  const labels = ['Consumo (km/L)', 'Valor (R$)', 'Custo/km (R$)'];
  const chartColors = ['#34D399', '#22D3EE', '#FB923C'];
  
  ['c1', 'c2', 'c3'].forEach((id, idx) => {
    const ctx = document.getElementById(id).getContext("2d");
    const data = idx === 0 ? history.map(h => h.consumption) : idx === 1 ? history.map(h => h.value) : history.map(h => h.costPerKm);
    
    activeCharts.push(new Chart(ctx, { 
      type: idx === 1 ? 'bar' : 'line', 
      data: { labels: history.map(h => formatDate(h.date)), datasets: [{ label: labels[idx], data: data, backgroundColor: chartColors[idx] + '55', borderColor: chartColors[idx], borderWidth: 2, pointBackgroundColor: chartColors[idx], borderRadius: 6, tension: 0.35, fill: true }] }, 
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#F3F6FC', font: { family: 'Inter' } } }, title: { display: true, text: labels[idx], color: '#F3F6FC', font: { family: 'Space Grotesk', size: 14, weight: '600' } } }, scales: { x: { ticks: { color: '#92A0C2', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1a233f' } }, y: { ticks: { color: '#92A0C2', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1a233f' } } } } 
    }));
  });
}

function showTab(tab) {
  document.querySelectorAll("main").forEach(m => m.style.display = "none");
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById(tab).style.display = "block";
  document.getElementById("btn-" + tab).classList.add("active");
  if(tab === 'history') showHistory();
  if(tab === 'charts') renderCharts();
}

document.getElementById("date").value = new Date().toISOString().split("T")[0];
loadData();

/* ===== Temas (Instrumento padrão, + Escuro e Claro) ===== */
const THEMES = [
  { id: 'instrumento', name: 'Instrumento', color: '#22D3EE' },
  { id: 'escuro',      name: 'Escuro',      color: '#60A5FA' },
  { id: 'claro',       name: 'Claro',       color: '#0EA5C7' }
];

function renderThemeList(current) {
  const list = document.getElementById('themeList');
  list.innerHTML = THEMES.map(t => `
    <div class="theme-option ${t.id === current ? 'active' : ''}" onclick="applyTheme('${t.id}')">
      <span class="swatch" style="background:${t.color}"></span>
      <span class="label">${t.name}</span>
    </div>`).join('');
}

async function applyTheme(id) {
  if (id === 'instrumento') {
    document.body.removeAttribute('data-color-theme');
  } else {
    document.body.setAttribute('data-color-theme', id);
  }
  renderThemeList(id);
  if (document.getElementById('charts').style.display !== 'none') renderCharts();
  try {
    if (window.storage) await window.storage.set('fluxo:theme', id, false);
  } catch (e) { /* segue sem persistir se indisponível */ }
}

function toggleThemePanel() {
  document.getElementById('themePanel').classList.toggle('open');
}

document.addEventListener('click', (e) => {
  const panel = document.getElementById('themePanel');
  const btn = document.getElementById('themeBtn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});

(async function initTheme() {
  let saved = 'instrumento';
  try {
    if (window.storage) {
      const r = await window.storage.get('fluxo:theme', false);
      if (r && r.value) saved = r.value;
    }
  } catch (e) { /* usa o tema padrão se não houver storage disponível */ }
  renderThemeList(saved);
  if (saved !== 'instrumento') document.body.setAttribute('data-color-theme', saved);
})();

/* ===== Evitar que o teclado cubra o campo em foco (reforça o onfocus já existente) ===== */
function scrollFieldIntoView(el) {
  setTimeout(() => { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
}
document.querySelectorAll('#form input, #form select').forEach(el => {
  el.addEventListener('focus', () => scrollFieldIntoView(el));
});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const active = document.activeElement;
    if (active && active.closest('#form')) scrollFieldIntoView(active);
  });
}

/* ===================================================================
   PASSO 1 — Login com Google (Firebase Auth)
   Importante: isto AINDA NÃO separa os dados por pessoa. Enquanto o
   Passo 2 não for feito, o Histórico continua sendo o mesmo banco
   compartilhado de sempre, esteja você logado ou não. Este passo só
   liga o login em si, de forma isolada e segura para testar.

   O SDK do Firebase Auth só é baixado quando alguém clica em
   "Entrar com Google" — nunca no carregamento da página, e nunca
   por uma tag <script> estática. Isso evita o travamento que
   aconteceu da última vez.

   Para ativar de verdade, troque os valores abaixo pelos do seu
   projeto (Firebase Console > Configurações do projeto > Geral >
   "Seus apps"), e ative o provedor "Google" em
   Authentication > Sign-in method.
=================================================================== */
const FIREBASE_AUTH_CONFIG = {
  apiKey: "AIzaSyDHAMi3FJFmbuaEG4BK_w2Wvd2eKKyBb6g",
  authDomain: "projeto-flutter-c6a24.firebaseapp.com",
  projectId: "projeto-flutter-c6a24",
  appId: "1:265122727317:web:90e8c20d5ee9275a51629c"
};

let authReady = false;
let firebaseLoading = false;

function firebaseConfigured() {
  return FIREBASE_AUTH_CONFIG.apiKey !== "COLE_SUA_API_KEY_AQUI";
}

function ensureFirebaseLoaded(callback) {
  if (authReady) { callback(); return; }
  if (firebaseLoading) { setTimeout(() => ensureFirebaseLoaded(callback), 300); return; }
  firebaseLoading = true;
  const s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js';
  s1.onload = () => {
    const s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js';
    s2.onload = () => {
      try {
        firebase.initializeApp(FIREBASE_AUTH_CONFIG);
        authReady = true;
      } catch (e) { console.warn("Firebase Auth não inicializado:", e); }
      firebaseLoading = false;
      callback();
    };
    s2.onerror = () => { firebaseLoading = false; showToast("Não foi possível carregar o login do Google. Verifique a conexão.", "danger"); renderProfilePanel(); };
    document.head.appendChild(s2);
  };
  s1.onerror = () => { firebaseLoading = false; showToast("Não foi possível carregar o login do Google. Verifique a conexão.", "danger"); renderProfilePanel(); };
  document.head.appendChild(s1);
}

const GOOGLE_ICON_SVG = '<svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6 29.5 4 24 4c-7.4 0-13.8 4.2-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.3 0 10.2-2 13.9-5.4l-6.4-5.4C29.4 34.9 26.8 36 24 36c-5.3 0-9.7-3.1-11.4-7.6l-6.5 5C9.9 39.6 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.4 5.4C40.9 36.5 44 30.9 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>';

function renderProfilePanel() {
  const panel = document.getElementById('profilePanel');
  const btn = document.getElementById('profileBtn');
  const user = authReady && firebase.auth().currentUser;

  if (user) {
    btn.innerHTML = user.photoURL
      ? `<img src="${user.photoURL}" alt="${user.displayName || 'Usuário'}">`
      : `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>`;
    panel.innerHTML = `
      <div class="profile-info">
        ${user.photoURL ? `<img src="${user.photoURL}" alt="">` : `<div class="avatar-fallback"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg></div>`}
        <div class="names">
          <div class="p-name">${user.displayName || 'Usuário'}</div>
          <div class="p-email">${user.email || ''}</div>
        </div>
      </div>
      <button class="logout-btn" onclick="signOutGoogle()">Sair da conta</button>
      <div class="profile-status">Passo 1 de 2: login funcionando. Seu histórico ainda é o mesmo compartilhado de sempre — a separação por pessoa vem no Passo 2.</div>`;
  } else {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>`;
    panel.innerHTML = `
      <div class="theme-title">Sua conta</div>
      <button class="google-btn" id="googleSignInBtn" onclick="signInWithGoogle()">${GOOGLE_ICON_SVG}Entrar com Google</button>
      ${firebaseConfigured()
        ? '<div class="profile-status">Passo 1 de 2: isto testa o login. O histórico continua compartilhado por enquanto.</div>'
        : '<div class="profile-hint">Login ainda não configurado. Adicione as credenciais do Firebase Auth no código (FIREBASE_AUTH_CONFIG) para ativar.</div>'}`;
  }
}

async function signInWithGoogle() {
  if (!firebaseConfigured()) {
    alert("Login com Google ainda não configurado. Veja o comentário FIREBASE_AUTH_CONFIG no código.");
    return;
  }
  const btn = document.getElementById('googleSignInBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Conectando...'; }
  ensureFirebaseLoaded(async () => {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await firebase.auth().signInWithPopup(provider);
      showToast("Login realizado!");
      renderProfilePanel();
    } catch (e) {
      console.error(e);
      showToast("Erro ao entrar com Google.", "danger");
      renderProfilePanel();
    }
  });
}

async function signOutGoogle() {
  try {
    await firebase.auth().signOut();
    showToast("Sessão encerrada.");
    renderProfilePanel();
  } catch (e) { console.error(e); }
}

function toggleProfilePanel() {
  renderProfilePanel();
  document.getElementById('profilePanel').classList.toggle('open');
}

document.addEventListener('click', (e) => {
  const pPanel = document.getElementById('profilePanel');
  const pBtn = document.getElementById('profileBtn');
  if (pPanel.classList.contains('open') && !pPanel.contains(e.target) && e.target !== pBtn && !pBtn.contains(e.target)) {
    pPanel.classList.remove('open');
  }
});

renderProfilePanel();
</script>
