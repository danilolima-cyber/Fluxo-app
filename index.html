<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo</title>
<!-- Manifest atualizado para "Fluxo" -->
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjogIkZsdXhvIiwgInNob3J0X25hbWUiOiAiRmx1eG8iLCAic3RhcnRfdXJsIjogIi8iLCAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwgImJhY2tncm91bmRfY29sb3IiOiAiIzBGMTcyQSIsICJ0aGVtZV9jb2xvciI6ICIjM0I4MkY2In0=">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg-color: #0F172A; --card-bg: #1E293B; --nav-bg: #0B1120; --input-bg: #334155; --text-main: #F8FAFC; --text-secondary: #94A3B8; --primary: #3B82F6; --success: #10B981; --danger: #EF4444; }
  body { font-family: 'Poppins', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; min-height: 100vh; }
  * { color: var(--text-main); }
  header { background: var(--nav-bg); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1E293B; }
  .header-title { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
  nav { display: flex; background: var(--nav-bg); position: sticky; top: 0; z-index: 100; }
  nav button { flex: 1; padding: 14px; border: none; background: transparent; color: var(--text-secondary); font-weight: 600; cursor: pointer; transition: 0.3s; }
  nav button.active { color: var(--text-main); background: rgba(59, 130, 246, 0.1); border-bottom: 3px solid var(--primary); }
  main { max-width: 500px; margin: 20px auto; background: var(--card-bg); padding: 20px; border-radius: 12px; }
  #form { max-height: calc(100vh - 180px); overflow-y: auto; padding-bottom: 320px; scroll-behavior: smooth; }
  input, select { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--input-bg); color: var(--text-main); font-size: 16px; box-sizing: border-box; }
  .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .selector-group { display: flex; gap: 10px; margin: 10px 0 20px; }
  .selector-group button { flex: 1; padding: 14px; border: none; border-radius: 8px; background: var(--input-bg); color: var(--text-secondary); font-weight: 600; }
  .selector-group button.active { background: var(--primary); color: white; }
  .btn-group { display: flex; gap: 10px; margin-top: 25px; }
  button.action { flex: 1; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .history-card { background: var(--input-bg); padding: 20px; border-radius: 12px; margin-bottom: 16px; border-left: 6px solid #ccc; font-size: 15px; line-height: 1.6; position: relative; }
  .fuel-Etanol { border-left-color: var(--success); }
  .fuel-Gasolina { border-left-color: var(--primary); }
  .history-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
  .history-actions button { padding: 4px 8px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
  .edit-btn { background: #f59e0b; color: white; }
  .delete-btn { background: var(--danger); color: white; }
  .stats-box { background: var(--nav-bg); padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; line-height: 1.6; border: 1px solid #334155; }
  .chart-wrapper { background: var(--nav-bg); padding: 20px; border-radius: 12px; margin-bottom: 25px; height: 350px; }
  #toast { visibility: hidden; min-width: 250px; background: var(--success); color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 999; left: 50%; bottom: 30px; transform: translateX(-50%); }
  #toast.show { visibility: visible; }
</style>
</head>
<body data-theme="oficial">
<div id="toast">Dados salvos!</div>
<header>
<div class="header-title">
  <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <linearGradient id="vibrantGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3B82F6" />
        <stop offset="50%" style="stop-color:#8B5CF6" />
        <stop offset="100%" style="stop-color:#10B981" />
      </linearGradient>
    </defs>
    <!-- F estilizado com curvas de fluxo e brilho -->
    <path d="M25 15 C 25 15, 75 15, 75 35 C 75 55, 25 55, 25 55 L 25 85" fill="none" stroke="url(#vibrantGradient)" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M25 55 L 55 55" fill="none" stroke="url(#vibrantGradient)" stroke-width="15" stroke-linecap="round" filter="url(#glow)"/>
  </svg>
  <span>Fluxo</span>
</div>

  <span>Fluxo</span></>
</header>
<nav>
  <button class="active" id="btn-form" onclick="showTab('form')">Abastecer</button>
  <button id="btn-history" onclick="showTab('history')">Histórico</button>
  <button id="btn-charts" onclick="showTab('charts')">Gráficos</button>
</nav>

<main id="form">
  <input type="hidden" id="editId">
  <label>🚗 Veículo:</label> <input type="text" id="car" list="carList" placeholder="Ex: C3">
  <datalist id="carList"></datalist>
  <label>📅 Data:</label> <input type="date" id="date">
  <label>⛽ Combustível:</label>
  <input type="hidden" id="fuel" value="Etanol">
  <div class="selector-group" id="fuel-btns">
     <button type="button" class="active" onclick="selectOption('fuel', 'Etanol', 'fuel-btns')">Etanol</button>
     <button type="button" onclick="selectOption('fuel', 'Gasolina', 'fuel-btns')">Gasolina</button>
  </div>
  <label>💧 Litros:</label> <input type="number" id="liters" step="0.01">
  <label>💰 Valor (R$):</label> <input type="number" id="value" step="0.01">
  <label>🛣️ KM Rodado:</label> <input type="number" id="km" onfocus="this.scrollIntoView({behavior:'smooth'})">
  <div class="btn-group">
    <button class="action" id="saveBtn" style="background:var(--success)" onclick="saveData()">Registrar</button>
    <button class="action" style="background:var(--danger)" onclick="clearForm()">Limpar</button>
  </div>
</main>

<main id="history" style="display:none;">
  <select id="filterCar" onchange="showHistory()" style="margin-bottom:10px;"><option value="Todos">Todos os veículos</option></select>
  <div class="filter-row">
    <select id="filterFuel" onchange="showHistory()"><option value="Todos">Combustível</option><option value="Etanol">Etanol</option><option value="Gasolina">Gasolina</option></select>
    <select id="filterDate" onchange="showHistory()"><option value="Todos">Mês/Ano</option></select>
  </div>
  <div id="stats" class="stats-box"></div>
  <div id="output"></div>
</main>

<main id="charts" style="display:none;">
  <div class="chart-wrapper"><canvas id="c1"></canvas></div>
  <div class="chart-wrapper"><canvas id="c2"></canvas></div>
  <div class="chart-wrapper"><canvas id="c3"></canvas></div>
</main>

<script>
const FIREBASE_URL = "https://projeto-flutter-c6a24-default-rtdb.firebaseio.com/";
const BRL = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
let history = [];
let activeCharts = [];

function selectOption(inputId, value, groupId) {
  document.getElementById(inputId).value = value;
  const btns = document.getElementById(groupId).getElementsByTagName('button');
  for(let b of btns) b.classList.remove('active');
  event.target.classList.add('active');
}

function showToast(msg = "Sucesso!") {
  const x = document.getElementById("toast");
  x.textContent = msg;
  x.className = "show";
  setTimeout(() => x.className = "", 3000);
}

function formatDate(dateStr) { const [y, m, d] = dateStr.split('-'); return `${d}/${m}/${y}`; }

async function loadData() {
  // Performance: busca apenas os últimos 50 registros
  const resp = await fetch(FIREBASE_URL + "abastecimentos.json?orderBy=\"$key\"&limitToLast=50");
  const data = await resp.json();
  history = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
  
  const cars = [...new Set(history.map(h => h.car))];
  const list = document.getElementById("carList");
  list.innerHTML = "";
  cars.forEach(c => list.innerHTML += `<option value="${c}">`);
  
  const filterCar = document.getElementById("filterCar");
  const currentCar = filterCar.value;
  filterCar.innerHTML = '<option value="Todos">Todos os veículos</option>';
  cars.forEach(c => filterCar.innerHTML += `<option value="${c}">${c}</option>`);
  filterCar.value = currentCar;

  const dates = [...new Set(history.map(h => h.date.substring(0, 7)))].sort().reverse();
  const filterDate = document.getElementById("filterDate");
  const currentDate = filterDate.value;
  filterDate.innerHTML = '<option value="Todos">Mês/Ano</option>';
  dates.forEach(d => filterDate.innerHTML += `<option value="${d}">${d.split('-')[1]}/${d.split('-')[0]}</option>`);
  filterDate.value = currentDate;
}

async function saveData() {
  const liters = parseFloat(document.getElementById("liters").value);
  const value = parseFloat(document.getElementById("value").value);
  const km = parseFloat(document.getElementById("km").value);
  const car = document.getElementById("car").value;

  if(!car || isNaN(liters) || isNaN(value) || isNaN(km) || liters <= 0 || value <= 0 || km <= 0) {
    alert("Preencha todos os campos com valores positivos!");
    return;
  }

  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "Salvando...";

  const data = { car, fuel: document.getElementById("fuel").value, liters, value, km, date: document.getElementById("date").value, costPerKm: value / km, consumption: km / liters };
  const editId = document.getElementById("editId").value;
  
  await fetch(`${FIREBASE_URL}abastecimentos/${editId ? editId : ''}.json`, { 
    method: editId ? 'PUT' : 'POST', 
    body: JSON.stringify(data) 
  });
  
  showToast(editId ? "Atualizado!" : "Registrado!");
  btn.disabled = false;
  btn.textContent = "Registrar";
  clearForm();
  loadData();
}

function clearForm() {
  document.getElementById("car").value = "";
  document.getElementById("liters").value = "";
  document.getElementById("value").value = "";
  document.getElementById("km").value = "";
  document.getElementById("editId").value = "";
}

async function deleteEntry(id) {
  if (!confirm("Excluir?")) return;
  await fetch(`${FIREBASE_URL}abastecimentos/${id}.json`, { method: 'DELETE' });
  loadData();
}

function editEntry(id) {
  const entry = history.find(h => h.id === id);
  if (!entry) return;
  document.getElementById("editId").value = id;
  document.getElementById("car").value = entry.car;
  document.getElementById("date").value = entry.date;
  document.getElementById("fuel").value = entry.fuel;
  document.getElementById("liters").value = entry.liters;
  document.getElementById("value").value = entry.value;
  document.getElementById("km").value = entry.km;
  showTab('form');
}

function showHistory() {
  const fCar = document.getElementById("filterCar").value;
  const fFuel = document.getElementById("filterFuel").value;
  const fDate = document.getElementById("filterDate").value;

  const filtered = history.filter(h => {
    const matchCar = (fCar === "Todos" || h.car === fCar);
    const matchFuel = (fFuel === "Todos" || h.fuel === fFuel);
    const matchDate = (fDate === "Todos" || h.date.substring(0, 7) === fDate);
    return matchCar && matchFuel && matchDate;
  });
  
  if (filtered.length > 0) {
    const avgCons = filtered.reduce((acc, h) => acc + h.consumption, 0) / filtered.length;
    const avgCost = filtered.reduce((acc, h) => acc + h.costPerKm, 0) / filtered.length;
    document.getElementById("stats").innerHTML = `
      Média filtrada: <strong>${avgCons.toFixed(1)} km/L</strong> | 
      Custo: <strong>${BRL.format(avgCost)}/km</strong>
    `;
  } else {
    document.getElementById("stats").innerHTML = "Nenhum dado encontrado.";
  }

  let html = "";
  filtered.reverse().forEach(h => {
    html += `
      <div class="history-card fuel-${h.fuel}">
        <div class="history-actions">
          <button class="edit-btn" onclick="editEntry('${h.id}')">Editar</button>
          <button class="delete-btn" onclick="deleteEntry('${h.id}')">Excluir</button>
        </div>
        <div style="font-size: 16px; font-weight: bold;">${h.car} - ${formatDate(h.date)}</div>
        Combustível: <strong>${h.fuel}</strong><br>
        ${h.liters}L | ${BRL.format(h.value)} | KM: ${h.km}<br>
        Consumo: <strong>${Number(h.consumption).toFixed(1)} km/L</strong> | Custo: <strong>${BRL.format(h.costPerKm)}/km</strong>
      </div>`;
  });
  document.getElementById("output").innerHTML = html || "<p>Nenhum registro.</p>";
}

function renderCharts() {
  activeCharts.forEach(c => c.destroy()); 
  activeCharts = [];
  const labels = ['Consumo (km/L)', 'Valor (R$)', 'Custo/km (R$)'];
  const chartColors = ['#10B981', '#3B82F6', '#EF4444'];
  
  ['c1', 'c2', 'c3'].forEach((id, idx) => {
    const ctx = document.getElementById(id).getContext("2d");
    const data = idx === 0 ? history.map(h => h.consumption) : idx === 1 ? history.map(h => h.value) : history.map(h => h.costPerKm);
    
    activeCharts.push(new Chart(ctx, { 
      type: idx === 1 ? 'bar' : 'line', 
      data: { labels: history.map(h => formatDate(h.date)), datasets: [{ label: labels[idx], data: data, backgroundColor: chartColors[idx] + '66', borderColor: chartColors[idx], tension: 0.3 }] }, 
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#F8FAFC' } }, title: { display: true, text: labels[idx], color: '#F8FAFC' } }, scales: { x: { ticks: { color: '#94A3B8' } }, y: { ticks: { color: '#94A3B8' } } } } 
    }));
  });
}

function showTab(tab) {
  document.querySelectorAll("main").forEach(m => m.style.display = "none");
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById(tab).style.display = "block";
  document.getElementById("btn-" + tab).classList.add("active");
  if(tab === 'history') showHistory();
  if(tab === 'charts') renderCharts();
}

document.getElementById("date").value = new Date().toISOString().split("T")[0];
loadData();
</script>
</body>
</html>
