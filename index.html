<style>
  :root {
    /* ===== Design tokens — "instrument cluster" theme ===== */
    --bg-color: #070B14;
    --bg-color-2: #0B1120;
    --card-bg: #121a2c;
    --surface-elevated: #17203a;
    --nav-bg: rgba(7, 11, 20, 0.82);
    --input-bg: #1b2440;
    --input-bg-focus: #212c4d;
    --border-soft: #232f52;
    --border-soft-2: #1a233f;
    --text-main: #F3F6FC;
    --text-secondary: #92A0C2;
    --text-muted: #5B688C;

    --primary: #22D3EE;
    --primary-2: #38BDF8;
    --primary-glow: rgba(34, 211, 238, 0.35);

    --ethanol: #34D399;
    --ethanol-glow: rgba(52, 211, 153, 0.35);
    --gasolina: #FB923C;
    --gasolina-glow: rgba(251, 146, 60, 0.35);

    --success: #10B981;
    --danger: #F87171;
    --warning: #FBBF24;

    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;

    --font-display: 'Space Grotesk', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);

    --grad-1: rgba(34,211,238,0.10);
    --grad-2: rgba(52,211,153,0.08);
    --grad-3: rgba(251,146,60,0.06);
  }

  /* ===== Tema: Aurora (roxo/violeta) ===== */
  body[data-color-theme="aurora"] {
    --bg-color: #0B0A1F; --bg-color-2: #100E2B; --card-bg: #161335; --surface-elevated: #1C1842;
    --nav-bg: rgba(11, 10, 31, 0.82); --input-bg: #201B4C; --input-bg-focus: #251F57;
    --border-soft: #2D2766; --border-soft-2: #221C4C;
    --text-main: #F4F2FF; --text-secondary: #A69FD9; --text-muted: #6A62A0;
    --primary: #A78BFA; --primary-2: #C4B5FD; --primary-glow: rgba(167,139,250,0.35);
    --grad-1: rgba(167,139,250,0.14); --grad-2: rgba(52,211,153,0.07); --grad-3: rgba(196,181,253,0.08);
  }

  /* ===== Tema: Combustão (âmbar/vermelho, alto contraste) ===== */
  body[data-color-theme="combustao"] {
    --bg-color: #130B08; --bg-color-2: #180F0A; --card-bg: #1E140D; --surface-elevated: #261A10;
    --nav-bg: rgba(19, 11, 8, 0.85); --input-bg: #2A1C12; --input-bg-focus: #322213;
    --border-soft: #3D2A17; --border-soft-2: #2A1C12;
    --text-main: #FDF4EC; --text-secondary: #C7A688; --text-muted: #8C6C51;
    --primary: #FB923C; --primary-2: #F97316; --primary-glow: rgba(251,146,60,0.35);

  /* ===== Tema: Escuro (neutro, alto contraste, estilo OLED) ===== */

  /* ===== Tema: Claro (uso diurno) ===== */

  * { box-sizing: border-box; }

  #themePanel {

  #profileBtn {

    border-radius: 50%; border: 1px solid var(--border-soft); background: var(--input-bg);

  }
  #profileBtn:hover { border-color: var(--primary); }
  #profileBtn:active { transform: scale(0.93); }
  #profileBtn svg { width: 17px; height: 17px; stroke: var(--primary); }
  #profileBtn img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  #profilePanel {
    display: none; position: absolute; top: 44px; right: 0; z-index: 200;

  .google-btn {

  nav {
    display: flex;
    gap: 6px;
    background: var(--nav-bg);

  nav button {

    background: transparent;

    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.01em;

  }
  nav button:hover { color: var(--text-main); }

  nav button.active {

  #form { max-height: calc(100vh - 220px); overflow-y: auto; padding-bottom: 320px; scroll-behavior: smooth; }

  .field { margin-bottom: 18px; }
  .field-label {
    display: flex;
    align-items: center;

    font-family: var(--font-display);
    font-size: 13px;

  input, select {
    width: 100%;

  .selector-group { display: flex; gap: 10px; margin: 0 0 18px; }

    align-items: center;

    padding: 14px;

    border-radius: var(--radius-sm);

    color: var(--text-secondary);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.25s var(--ease);

  .selector-group button svg { width: 17px; height: 17px; stroke: currentColor; }
  .selector-group button:active { transform: scale(0.97); }
  .selector-group button.active[data-fuel="Etanol"] {
    background: linear-gradient(135deg, rgba(52,211,153,0.22), rgba(52,211,153,0.08));
    border-color: var(--ethanol);

    box-shadow: 0 0 0 3px var(--ethanol-glow);

  .selector-group button.active[data-fuel="Gasolina"] {
    background: linear-gradient(135deg, rgba(251,146,60,0.22), rgba(251,146,60,0.08));

  .btn-group { display: flex; gap: 10px; margin-top: 25px; }
  button.action {

    font-size: 15px;

    transition: transform 0.15s var(--ease), box-shadow 0.25s var(--ease), filter 0.2s var(--ease);

  }
  button.action:hover { filter: brightness(1.08); }
  button.action:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  #saveBtn { background: linear-gradient(135deg, var(--success), #059669); box-shadow: 0 10px 26px -10px rgba(16,185,129,0.5); }
  .btn-group .action:last-child { background: linear-gradient(135deg, var(--danger), #dc2626); box-shadow: 0 10px 26px -10px rgba(248,113,113,0.45); }

  /* ===== Stats / gauge ===== */
  .stats-box {

<body data-theme="oficial">
<div id="toast">Dados salvos!</div>
<div id="confirmModal">
